{% extends 'base.html' %}

{% block content %}

<h2>Edit Contact</h2>

<form method="POST">

<div class="mb-3">
    <label>Name</label>
    <input type="text"
           name="name"
           class="form-control"
           value="{{ contact.name }}"
           required>
</div>

<div class="mb-3">
    <label>Phone</label>
    <input type="text"
           name="phone"
           class="form-control"
           value="{{ contact.phone }}"
           required>
</div>

<div class="mb-3">
    <label>Email</label>
    <input type="email"
           name="email"
           class="form-control"
           value="{{ contact.email }}"
           required>
</div>

<button class="btn btn-warning">
    Update Contact
</button>

</form>

{% endblock %}
