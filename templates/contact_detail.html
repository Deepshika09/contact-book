{% extends 'base.html' %}

{% block content %}

<h2>Contact Details</h2>

<div class="card">

    <div class="card-body">

        <h4>{{ contact.name }}</h4>

        <p>
            <strong>Phone:</strong>
            {{ contact.phone }}
        </p>

        <p>
            <strong>Email:</strong>
            {{ contact.email }}
        </p>

    </div>

</div>

{% endblock %}
